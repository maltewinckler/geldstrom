# Geldstrom Banking Gateway — Docker Compose
#
# ─────────────────────────────────────────────────────────────────────────────
# Secrets
# ─────────────────────────────────────────────────────────────────────────────
# Secrets are loaded from config/*.env files (gitignored).  Copy the examples
# and fill in real values before running docker compose:
#
#   cp config/admin_cli.env.example config/admin_cli.env   # then set passwords
#   cp config/gateway.env.example   config/gateway.env     # then set passwords
#
# These files are loaded directly into the relevant containers via env_file:.
# All other configuration is wired in the environment: blocks below and has no
# secrets to protect.
#
# On the VPS the deploy workflow writes the two config/*.env files from GitHub
# secrets before running docker compose up -d.  No other files are needed on
# the server.
#
#
#       docker compose up -d
#
# One-time first-run setup (run after 'docker compose up -d' succeeds)
# ─────────────────────────────────────────────────────────────────────────────
# a) Load the FinTS institute catalog:
#
#       docker compose run --rm gateway-admin-cli gw-admin catalog sync /data/fints_institute.csv
#
# b) Store your FinTS product registration key:
#
#       docker compose run --rm gateway-admin-cli gw-admin product update "YOUR_PRODUCT_KEY" \
#           --product-version "1.0.0"
#
# c) Create the first API consumer:
#
#       docker compose run --rm gateway-admin-cli gw-admin users create you@example.com
#
#    The raw API key is printed exactly once — copy it immediately.
#
# Caddy / Nginx
# ─────────────
# The gateway binds to 127.0.0.1:8000.  Point your reverse proxy at that
# address for TLS termination.  Example Caddy block:
#
#   banking.example.com {
#       reverse_proxy localhost:8000
#   }
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: geldstrom_postgres
    restart: unless-stopped
    env_file:
      - config/admin_cli.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-admin-cli:
    image: maltewin/geldstrom-gateway-admin-cli:latest
    container_name: geldstrom_gateway_admin_cli
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - config/admin_cli.env
    volumes:
      - ./data:/data:ro
    command: ["gw-admin", "db", "init"]

  gateway:
    image: maltewin/geldstrom-gateway:latest
    container_name: geldstrom_gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      gateway-admin-cli:
        condition: service_completed_successfully
    # Secrets (DB password) come from the env file.
    # GATEWAY_DB_HOST overrides the 'localhost' default from the env file with
    # the Docker service name.  All other env-file values are used as-is.
    env_file:
      - config/gateway.env
    ports:
      - 127.0.0.1:8000:8000
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  postgres_data:
