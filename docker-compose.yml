# Geldstrom Banking Gateway — Docker Compose
#
# ─────────────────────────────────────────────────────────────────────────────
# Secrets
# ─────────────────────────────────────────────────────────────────────────────
# Secrets are loaded from config/*.env files (gitignored).  Copy the examples
# and fill in real values before running docker compose:
#
#   cp config/admin_cli.env.example config/admin_cli.env   # then set passwords
#   cp config/gateway.env.example   config/gateway.env     # then set passwords
#
# These files are loaded directly into the relevant containers via env_file:.
# All other configuration is wired in the environment: blocks below and has no
# secrets to protect.
#
# On the VPS the deploy workflow writes the two config/*.env files from GitHub
# secrets before running docker compose up -d.  No other files are needed on
# the server.
#
#
#       docker compose up -d
#
# One-time first-run setup (run after 'docker compose up -d' succeeds)
# ─────────────────────────────────────────────────────────────────────────────
# a) Load the FinTS institute catalog:
#
#       docker compose exec gateway-admin gw-admin catalog sync /data/fints_institute.csv
#
# b) Create the first API consumer (token is emailed automatically):
#
#       docker compose exec gateway-admin gw-admin users create you@example.com
#
# Admin UI
# ────────
# The admin UI binds to 127.0.0.1:8001.  Access via SSH port-forwarding only:
#
#   ssh -L 8001:localhost:8001 user@vps
#   open http://localhost:8001
#
# Caddy / Nginx
# ─────────────
# The gateway binds to 127.0.0.1:8000.  Point your reverse proxy at that
# address for TLS termination.  Example Caddy block:
#
#   banking.example.com {
#       reverse_proxy localhost:8000
#   }
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: geldstrom_postgres
    restart: unless-stopped
    env_file:
      - config/admin_cli.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: geldstrom_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Admin UI ────────────────────────────────────────────────────────────────
  # Initialises the database schema on startup (idempotent), then serves the
  # admin web UI.  Access via SSH port-forwarding only — not exposed publicly.
  # On your local machine: ssh -L 8001:localhost:8001 user@vps
  # Then open: http://localhost:8001
  gateway-admin:
    image: maltewin/geldstrom-gateway-admin:latest
    container_name: geldstrom_gateway_admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - config/admin_cli.env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./data:/data:ro
    ports:
      - 127.0.0.1:8001:8000

  gateway:
    image: maltewin/geldstrom-gateway:latest
    container_name: geldstrom_gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gateway-admin:
        condition: service_started
    # Secrets (DB password) come from the env file.
    # GATEWAY_DB_HOST overrides the 'localhost' default from the env file with
    # the Docker service name.  All other env-file values are used as-is.
    env_file:
      - config/gateway.env
    environment:
      GATEWAY_REDIS_URL: "redis://redis:6379/0"
    ports:
      - 127.0.0.1:8000:8000
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  postgres_data:
