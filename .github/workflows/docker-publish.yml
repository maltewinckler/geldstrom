name: Publish Docker Images

# Triggered when relevant source files land on main. Creates 'latest' and
# immutable 'sha-<commit>' tags so every main-branch state is traceable.
# When a GitHub release is published (e.g. v1.2.3), semver tags are added too.
on:
  push:
    branches: [main]
    paths:
      - "apps/gateway/**"
      - "apps/gateway_admin/**"
      - "packages/**"
      - "uv.lock"
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            image_suffix: geldstrom-gateway
            dockerfile: apps/gateway/Dockerfile

          - service: gateway-admin
            image_suffix: geldstrom-gateway-admin
            dockerfile: apps/gateway_admin/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_suffix }}
          tags: |
            # 'latest' on every push to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # immutable SHA tag on every push to main (e.g. sha-a1b2c3d)
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            # semver tags on GitHub releases (e.g. v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref_name, 'v0.') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
