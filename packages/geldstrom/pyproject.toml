[project]
name = "geldstrom"
version = "0.0.2"
requires-python = ">=3.9"
dependencies = [
    "bleach>=5.0",
    "mt-940>=4.0",
    "pydantic>=2.0",
    "requests>=2.25",
    "sepaxml~=2.1",
    "enum-tools~=0.12",
    "python-dotenv>=0.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["geldstrom"]
