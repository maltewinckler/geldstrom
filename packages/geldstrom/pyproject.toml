[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "geldstrom"
version = "0.1.4"
description = "German banking API client for account data and transactions"
readme = "README.md"
license = "LGPL-3.0-only"
authors = [{ name = "Malte Winckler", email = "malte@nichts-ist-einfach.de" }]
keywords = ["banking", "fints", "hbci", "german-banking", "transactions"]
classifiers = [
	"Development Status :: 4 - Beta",
	"Intended Audience :: Developers",
	"Intended Audience :: Other Audience",
	"License :: OSI Approved :: GNU Lesser General Public License v3 (LGPLv3)",
	"Programming Language :: Python :: 3",
	"Programming Language :: Python :: 3.13",
]
requires-python = ">=3.13"
dependencies = [
	"bleach>=5.0,<6.0",
	"enum-tools>=0.12,<0.13",
	"mt-940>=4.0,<5.0",
	"pydantic>=2.0,<3.0",
	"requests>=2.25,<3.0",
	"sepaxml>=2.1,<2.2",
]

[tool.hatch.build.targets.wheel]
packages = ["geldstrom"]

[tool.hatch.build.targets.sdist]
include = [
	"/geldstrom",
	"/README.md",
	"/pyproject.toml",
]
