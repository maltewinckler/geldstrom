[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[project]
name = "geldstrom"
dynamic = ["version"]
description = "German banking API client for account data and transactions"
readme = "README.md"
license = "BUSL-1.1"
authors = [{ name = "Malte Winckler", email = "malte@nichts-ist-einfach.de" }]
keywords = ["banking", "fints", "hbci", "german-banking", "transactions"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Other Audience",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
requires-python = ">=3.9"

[tool.poetry]
version = "0.0.1"
packages = [{ include = "geldstrom" }]

[tool.poetry.dependencies]
python = ">=3.9,<4.0"
bleach = "^5.0"
mt-940 = "^4.0"
pydantic = "^2.0"
requests = "^2.25"
sepaxml = "~2.1"
enum-tools = "~0.12"
dotenv = "^0.9.9"

[tool.poetry.group.dev.dependencies]
pytest = "^7.0"
ruff = "^0.8"

[tool.ruff]
target-version = "py39"
line-length = 88

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
    "B905",   # zip without strict= (requires 3.10+)
    "ARG001", # unused function argument (common in protocols/interfaces)
    "ARG002", # unused method argument
    "SIM108", # ternary operator (not always more readable)
]

[tool.ruff.lint.isort]
known-first-party = ["geldstrom"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*" = ["ARG", "B", "SIM"]
"geldstrom/formals.py" = ["E501"]  # Legacy file with long lines

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]
markers = [
    "integration: marks tests as integration tests (require bank credentials)",
    "slow: marks tests as slow running",
]
